<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORE TX Debug</title>
<style>
body{background:#0a0a0a;color:#e5e5e5;font-family:monospace;padding:20px;font-size:12px}
input{background:#111;border:1px solid #333;border-radius:4px;color:#e5e5e5;font-family:monospace;font-size:12px;padding:8px 12px;outline:none;width:100%}
input:focus{border-color:#f97316}
button{background:#f97316;color:#000;border:none;border-radius:4px;font-weight:700;padding:9px 20px;cursor:pointer;font-size:13px}
button:hover{opacity:.85}
.row{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:8px}
label{font-size:10px;color:#888;margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:1px}
.f{margin-bottom:10px}
pre{background:#111;border:1px solid #222;border-radius:6px;padding:14px;overflow:auto;white-space:pre-wrap;word-break:break-all;max-height:80vh;font-size:11px;line-height:1.6;margin-top:12px}
.section{margin-top:16px;padding:10px 14px;background:#111;border:1px solid #222;border-radius:6px}
.section h3{color:#f97316;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.key{color:#7dd3fc} .val{color:#86efac} .str{color:#fcd34d}
.err{color:#f87171;padding:10px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:4px;margin-top:10px}
.spin{display:none;color:#f97316;margin-top:8px}
.spin.on{display:block}
</style>
</head>
<body>
<h2 style="color:#f97316;margin-bottom:16px">🔍 ORE TX Raw Inspector</h2>
<p style="color:#888;margin-bottom:16px;font-size:11px">Показує сирий JSON першої TX від Helius — щоб зрозуміти структуру даних</p>

<div class="f">
  <label>Адреса акаунту (miner або owner)</label>
  <div class="row">
    <input id="addr" type="text" placeholder="ACuy4eSvRtw5cjYQji39DxMFGAsMTdaPQm3Hxx4qVnT8">
    <button onclick="inspect()">Inspect →</button>
  </div>
</div>
<div class="f">
  <label>Helius API Key</label>
  <input id="key" type="password" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
</div>

<div class="spin" id="sp">⏳ Завантаження...</div>
<div class="err" id="err" style="display:none"></div>

<div id="out" style="display:none">
  <div class="section" id="s_summary">
    <h3>📋 Summary першої TX</h3>
    <div id="summary"></div>
  </div>
  <div class="section" id="s_instructions">
    <h3>🔧 Instructions (programIds)</h3>
    <div id="instructions"></div>
  </div>
  <div class="section" id="s_accounts">
    <h3>👤 AccountData (перші 10)</h3>
    <div id="accounts"></div>
  </div>
  <div class="section" id="s_transfers">
    <h3>💸 NativeTransfers</h3>
    <div id="transfers"></div>
  </div>
  <div class="section">
    <h3>📦 Всі TX (description + type + source)</h3>
    <div id="txlist"></div>
  </div>
  <div class="section">
    <h3>🗃️ Повний JSON першої TX</h3>
    <pre id="raw"></pre>
  </div>
</div>

<script>
async function inspect() {
  const addr = document.getElementById("addr").value.trim();
  const key  = document.getElementById("key").value.trim();
  const sp   = document.getElementById("sp");
  const err  = document.getElementById("err");
  const out  = document.getElementById("out");

  if (!addr || !key) { showErr("Введіть адресу та ключ"); return; }

  err.style.display="none"; out.style.display="none";
  sp.classList.add("on");

  try {
    const url = `https://api.helius.xyz/v0/addresses/${addr}/transactions?api-key=${key}&limit=10`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${await r.text()}`);
    const txs = await r.json();
    if (!Array.isArray(txs) || !txs.length) throw new Error("Немає TX або невірна відповідь");

    const first = txs[0];

    // Summary
    document.getElementById("summary").innerHTML = fmt({
      signature: first.signature,
      timestamp: new Date((first.timestamp||0)*1000).toLocaleString(),
      type: first.type,
      source: first.source,
      description: first.description,
      fee: first.fee,
      feePayer: first.feePayer,
    });

    // Instructions programIds
    const ixList = (first.instructions||[]).map(ix => ({
      programId: ix.programId,
      accounts: (ix.accounts||[]).length + " accounts",
      innerCount: (ix.innerInstructions||[]).length,
    }));
    document.getElementById("instructions").innerHTML =
      ixList.length ? fmt(ixList) : '<span style="color:#888">instructions[] порожній або відсутній</span>';

    // Account data
    const adList = (first.accountData||[]).slice(0,10).map(ad => ({
      account: ad.account,
      nativeBalanceChange: ad.nativeBalanceChange,
      tokenChanges: (ad.tokenBalanceChanges||[]).length,
    }));
    document.getElementById("accounts").innerHTML = fmt(adList);

    // Native transfers
    document.getElementById("transfers").innerHTML =
      fmt((first.nativeTransfers||[]).map(t=>({
        from: t.fromUserAccount,
        to: t.toUserAccount,
        amount_lamports: t.amount,
        amount_sol: (t.amount/1e9).toFixed(9),
      })));

    // All TX list
    document.getElementById("txlist").innerHTML = txs.map((t,i) =>
      `<div style="margin-bottom:6px;padding:6px 0;border-bottom:1px solid #222">
        <span style="color:#888">#${i+1}</span>
        <span style="color:#fcd34d"> [${t.type||"?"}]</span>
        <span style="color:#9ca3af"> src:${t.source||"?"}</span><br>
        <span style="color:#c4b5fd">${(t.description||"").slice(0,120)}</span><br>
        <span style="color:#555">ix programIds: ${(t.instructions||[]).map(x=>x.programId?.slice(0,8)+"…").join(", ")||"(none)"}</span>
      </div>`
    ).join("");

    // Raw JSON
    document.getElementById("raw").textContent = JSON.stringify(first, null, 2);

    out.style.display = "block";
  } catch(e) {
    showErr(e.message);
  } finally {
    sp.classList.remove("on");
  }
}

function showErr(msg) {
  const e = document.getElementById("err");
  e.textContent = "Помилка: " + msg;
  e.style.display = "block";
}

function fmt(obj) {
  return "<pre style='margin:0;background:transparent;border:none;padding:0'>" +
    JSON.stringify(obj, null, 2)
      .replace(/"([^"]+)":/g, '<span class="key">"$1"</span>:')
      .replace(/: "([^"]+)"/g, ': <span class="str">"$1"</span>')
      .replace(/: (true|false|null)/g, ': <span class="val">$1</span>')
      .replace(/: (-?\d+\.?\d*)/g, ': <span class="val">$1</span>')
    + "</pre>";
}
</script>
</body>
</html>
